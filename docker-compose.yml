version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: kaarigar-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    env_file: .env.example
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - auth-service
      - worker-service
      - job-service
      - geolocation-service
      - review-rating-service
      - payment-service
      - notification-service

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://kaarigar:kaarigar@postgres:5432/auth_db?schema=auth
      SERVICE_NAME: auth-service
    depends_on:
      - postgres
      - redis
      - kafka

  worker-service:
    build:
      context: .
      dockerfile: services/worker-service/Dockerfile
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://kaarigar:kaarigar@postgres:5432/worker_db?schema=worker
      SERVICE_NAME: worker-service
    depends_on:
      - postgres
      - redis
      - kafka

  job-service:
    build:
      context: .
      dockerfile: services/job-service/Dockerfile
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://kaarigar:kaarigar@postgres:5432/job_db?schema=job
      SERVICE_NAME: job-service
    depends_on:
      - postgres
      - redis
      - kafka

  geolocation-service:
    build:
      context: .
      dockerfile: services/geolocation-service/Dockerfile
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://kaarigar:kaarigar@postgres:5432/geo_db?schema=geo
      SERVICE_NAME: geolocation-service
    depends_on:
      - postgres
      - redis
      - kafka

  review-rating-service:
    build:
      context: .
      dockerfile: services/review-rating-service/Dockerfile
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://kaarigar:kaarigar@postgres:5432/review_db?schema=review
      SERVICE_NAME: review-rating-service
    depends_on:
      - postgres
      - redis
      - kafka

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://kaarigar:kaarigar@postgres:5432/payment_db?schema=payment
      SERVICE_NAME: payment-service
    depends_on:
      - postgres
      - redis
      - kafka

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://kaarigar:kaarigar@postgres:5432/notification_db?schema=notification
      SERVICE_NAME: notification-service
    depends_on:
      - postgres
      - redis
      - kafka

  postgres:
    image: postgis/postgis:16-3.5
    container_name: kaarigar-postgres
    environment:
      POSTGRES_USER: kaarigar
      POSTGRES_PASSWORD: kaarigar
      POSTGRES_DB: kaarigar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kaarigar-redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.4
    ports:
      - "3001:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:

