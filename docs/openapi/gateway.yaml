openapi: 3.0.3
info:
  title: Kaarigar API Gateway
  version: 1.0.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service healthy
  /auth/auth/register:
    post:
      summary: Register user
      responses:
        "201":
          description: Created
  /jobs/jobs:
    post:
      summary: Create job
      responses:
        "201":
          description: Created
  /geo/geo/nearby:
    get:
      summary: Find nearby workers
      responses:
        "200":
          description: OK
