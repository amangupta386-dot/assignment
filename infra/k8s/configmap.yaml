apiVersion: v1
kind: ConfigMap
metadata:
  name: kaarigar-config
  namespace: kaarigar
data:
  NODE_ENV: development
  REDIS_URL: redis://redis:6379
  KAFKA_BROKERS: kafka:9092
  POSTGRES_USER: kaarigar
  POSTGRES_PASSWORD: kaarigar
  POSTGRES_DB: kaarigar
---
apiVersion: v1
kind: Secret
metadata:
  name: kaarigar-secrets
  namespace: kaarigar
type: Opaque
stringData:
  JWT_SECRET: replace-with-strong-secret
  JWT_REFRESH_SECRET: replace-with-strong-refresh-secret
  RAZORPAY_KEY_ID: rzp_test_xxx
  RAZORPAY_KEY_SECRET: xxx
  FCM_SERVER_KEY: xxx
