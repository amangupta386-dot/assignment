apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: kaarigar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: kaarigar/api-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: kaarigar-config
            - secretRef:
                name: kaarigar-secrets
          env:
            - name: SERVICE_NAME
              value: api-gateway
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: kaarigar
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kaarigar-ingress
  namespace: kaarigar
spec:
  ingressClassName: nginx
  rules:
    - host: kaarigar.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
