apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: kaarigar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: kaarigar/auth-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: kaarigar-config
            - secretRef:
                name: kaarigar-secrets
          env:
            - name: DATABASE_URL
              value: postgresql://kaarigar:kaarigar@postgres:5432/auth_db?schema=auth
            - name: SERVICE_NAME
              value: auth-service
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: kaarigar
spec:
  selector:
    app: auth-service
  ports:
    - port: 3000
      targetPort: 3000
